spring:
  application:
    name: QS-EDR
  datasource:
    url: jdbc:h2:file:./data/qs-edr;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
server:
  port: 9003
qshield:
  jwt:
    secret: ${JWT_SECRET:QShield-CSOC-QS-EDR-Secret-2026}
  ai:
    enabled: false
---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/qshield_csoc
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:qshield}
    password: ${DB_PASSWORD:}
  jpa:
    properties:
      hibernate:
        default_schema: edr
