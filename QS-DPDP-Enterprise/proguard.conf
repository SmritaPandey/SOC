# ═══════════════════════════════════════════════════════════
# QS-DPDP Enterprise — ProGuard Configuration
# Obfuscates bytecode to protect intellectual property
# while preserving Spring Boot, Bouncy Castle, and SLF4J
# ═══════════════════════════════════════════════════════════

# ── General Options ──
-dontoptimize
-dontshrink
-keepattributes Signature,RuntimeVisibleAnnotations,AnnotationDefault,InnerClasses,EnclosingMethod,Exceptions
-keepattributes *Annotation*
-keepattributes SourceFile,LineNumberTable
-dontwarn java.lang.invoke.**
-dontwarn javax.**
-dontwarn jakarta.**
-dontwarn org.springframework.**
-dontwarn org.slf4j.**
-dontwarn ch.qos.logback.**
-dontwarn org.bouncycastle.**
-dontwarn io.jsonwebtoken.**
-dontwarn com.google.gson.**

# ── Keep Spring Boot Framework ──
-keep @org.springframework.boot.autoconfigure.SpringBootApplication class * { *; }
-keep @org.springframework.stereotype.Controller class * { *; }
-keep @org.springframework.web.bind.annotation.RestController class * { *; }
-keep @org.springframework.stereotype.Service class * { *; }
-keep @org.springframework.stereotype.Component class * { *; }
-keep @org.springframework.stereotype.Repository class * { *; }
-keep @org.springframework.context.annotation.Configuration class * { *; }
-keep @org.springframework.boot.context.properties.ConfigurationProperties class * { *; }

# Keep Spring-annotated methods
-keepclassmembers class * {
    @org.springframework.web.bind.annotation.* *;
    @org.springframework.beans.factory.annotation.Autowired *;
    @org.springframework.beans.factory.annotation.Value *;
    @jakarta.annotation.PostConstruct *;
    @jakarta.annotation.PreDestroy *;
}

# ── Keep REST Controllers (API surface) ──
-keep class com.qsdpdp.web.** { *; }
-keep class com.qsdpdp.api.** { *; }

# ── Keep Main Application ──
-keep class com.qsdpdp.QSDPDPApplication { *; }

# ── Keep Entity / Model Classes (serialized to JSON) ──
-keep class com.qsdpdp.licensing.License { *; }
-keep class com.qsdpdp.licensing.License$* { *; }
-keep class com.qsdpdp.vendor.VendorRiskService$Vendor { *; }
-keep class com.qsdpdp.vendor.VendorRiskService$DataSharingRecord { *; }
-keep class com.qsdpdp.vendor.VendorRiskService$VendorIncident { *; }
-keep class com.qsdpdp.vendor.VendorRiskService$VendorStatistics { *; }
-keep class com.qsdpdp.breach.Breach { *; }
-keep class com.qsdpdp.breach.BreachTimelineEvent { *; }
-keep class com.qsdpdp.core.ComplianceGap { *; }
-keep class com.qsdpdp.core.ComplianceScore { *; }
-keep class com.qsdpdp.consent.ConsentStatistics { *; }
-keep class com.qsdpdp.rag.RAGStatus { *; }
-keep class com.qsdpdp.rag.ModuleScore { *; }
-keep class com.qsdpdp.rules.RuleSeverity { *; }
-keep class com.qsdpdp.events.ComplianceEvent { *; }

# ── Keep Bouncy Castle Crypto Providers ──
-keep class org.bouncycastle.** { *; }
-keep class org.bouncycastle.jce.provider.BouncyCastleProvider { *; }

# ── Keep SLF4J / Logback ──
-keep class org.slf4j.** { *; }
-keep class ch.qos.logback.** { *; }

# ── Keep Swagger / OpenAPI annotations ──
-keep class io.swagger.v3.oas.annotations.** { *; }
-keepclassmembers class * {
    @io.swagger.v3.oas.annotations.* *;
}

# ── Keep Enum values ──
-keepclassmembers enum * {
    public static **[] values();
    public static ** valueOf(java.lang.String);
}

# ── Keep Serializable classes ──
-keepclassmembers class * implements java.io.Serializable {
    static final long serialVersionUID;
    static final java.io.ObjectStreamField[] serialPersistentFields;
    private void writeObject(java.io.ObjectOutputStream);
    private void readObject(java.io.ObjectInputStream);
    java.lang.Object writeReplace();
    java.lang.Object readResolve();
}

# ── Keep native methods ──
-keepclasseswithmembernames class * {
    native <methods>;
}

# ── Strip LicenseKeyGenerator from production build ──
# This is the admin-only key generation tool — NOT for client distribution
-assumenosideeffects class com.qsdpdp.licensing.LicenseKeyGenerator {
    public static void main(java.lang.String[]);
}

# ── Obfuscation Dictionary (optional, makes decompiled code harder to read) ──
-obfuscationdictionary proguard-dict.txt
-classobfuscationdictionary proguard-dict.txt
-packageobfuscationdictionary proguard-dict.txt
