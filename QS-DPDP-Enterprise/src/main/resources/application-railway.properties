# Railway Cloud Profile — PostgreSQL
spring.profiles.active=railway

# Server
server.port=${PORT:8080}

# Database — PostgreSQL via Railway
qsdpdp.database.type=postgresql
qsdpdp.database.host=${PGHOST:localhost}
qsdpdp.database.port=${PGPORT:5432}
qsdpdp.database.name=${PGDATABASE:railway}
qsdpdp.database.username=${PGUSER:postgres}
qsdpdp.database.password=${PGPASSWORD:}
qsdpdp.database.ssl=false

# Features
qsdpdp.features.auto-seed-data=true
qsdpdp.features.audit-enabled=true
qsdpdp.features.encryption-enabled=true

# Logging
logging.level.root=INFO
logging.level.com.qsdpdp=INFO

# CORS — Allow Vercel frontends
qsdpdp.cors.allowed-origins=${CORS_ORIGINS:*}
