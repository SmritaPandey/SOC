# ═══════════════════════════════════════════════════════════
# QS-SOC Platform — Production Profile Configuration
# Activate with: java -jar QShield-SOC-Platform.jar --spring.profiles.active=prod
# ═══════════════════════════════════════════════════════════

spring.profiles.active=prod

# ── TLS 1.3 Configuration (NIST SC-8, ISO A.13.1) ──
# Generate keystore: keytool -genkeypair -alias qshield-soc -keyalg RSA -keysize 4096
#   -validity 365 -storetype PKCS12 -keystore qshield-soc.p12
server.port=8443
server.ssl.enabled=true
server.ssl.key-store=file:${user.home}/.qsdpdp-enterprise/certs/qshield-soc.p12
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=qshield-soc
server.ssl.protocol=TLSv1.3
server.ssl.enabled-protocols=TLSv1.3
# Disable weak ciphers
server.ssl.ciphers=TLS_AES_256_GCM_SHA384,TLS_AES_128_GCM_SHA256,TLS_CHACHA20_POLY1305_SHA256

# ── JWT Configuration (NIST IA-5, AC-3) ──
# Generate secret: openssl rand -base64 32
qsdpdp.security.jwt.secret=${JWT_SECRET}
qsdpdp.security.jwt.access-token-expiry-ms=3600000
qsdpdp.security.jwt.refresh-token-expiry-ms=86400000

# ── CORS (OWASP A05) ──
# Replace with your actual production domains
qsdpdp.security.cors.allowed-origins=https://www.qsgrc.com,https://soc.qsgrc.com,https://admin.qsgrc.com

# ── Rate Limiting (NIST AC-7) ──
qsdpdp.security.rate-limit.max-requests=100
qsdpdp.security.rate-limit.auth-max-requests=5
qsdpdp.security.rate-limit.window-seconds=60

# ── Database (Production) ──
# PostgreSQL recommended for production
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:qshield_soc}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

# ── Logging (production-grade) ──
logging.level.root=WARN
logging.level.com.qsdpdp=INFO
logging.level.org.springframework.security=WARN
logging.file.name=${user.home}/.qsdpdp-enterprise/logs/qshield-soc.log
logging.logback.rollingpolicy.max-file-size=50MB
logging.logback.rollingpolicy.max-history=30

# ── Security Hardening ──
qsdpdp.security.mfa-required=true
qsdpdp.security.session-timeout-minutes=15
qsdpdp.security.max-failed-logins=3
qsdpdp.security.lockout-duration-minutes=60

# ── Swagger: disabled in production ──
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# ── Features: encryption always on ──
qsdpdp.features.auto-seed-data=false
qsdpdp.features.audit-enabled=true
qsdpdp.features.encryption-enabled=true

# ── Redis (required in prod) ──
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}

# ── Elasticsearch (SIEM) ──
spring.elasticsearch.uris=${ES_URI:http://localhost:9200}
spring.elasticsearch.username=${ES_USERNAME}
spring.elasticsearch.password=${ES_PASSWORD}

# ── AI Engine ──
chatbot.llm.ollama.host=${OLLAMA_HOST:http://localhost:11434}
