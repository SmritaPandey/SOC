# ═══════════════════════════════════════════════════════════════════
# QS-DPDP Enterprise — Application Configuration
# ═══════════════════════════════════════════════════════════════════
# Database type: sqlite (default) | postgresql | mysql | oracle | mssql
# ═══════════════════════════════════════════════════════════════════

server:
  port: 8080

spring:
  application:
    name: QS-DPDP Enterprise
  profiles:
    active: sqlite

qsdpdp:
  database:
    type: sqlite
    name: qsdpdp_enterprise
    max-pool-size: 10
    min-idle: 2
    connection-timeout-ms: 30000
    flyway-enabled: false

# ─── LOGGING ──────────────────────────────────────────────────────
logging:
  level:
    com.qsdpdp: INFO
    org.springframework: WARN

---
# ═══════════════════════════════════════════════════════════════════
# PROFILE: PostgreSQL
# ═══════════════════════════════════════════════════════════════════
spring:
  config:
    activate:
      on-profile: postgresql

qsdpdp:
  database:
    type: postgresql
    host: localhost
    port: 5432
    name: qsdpdp_enterprise
    username: qsdpdp
    password: qsdpdp_secret
    schema: public
    ssl: false

---
# ═══════════════════════════════════════════════════════════════════
# PROFILE: MySQL / MariaDB
# ═══════════════════════════════════════════════════════════════════
spring:
  config:
    activate:
      on-profile: mysql

qsdpdp:
  database:
    type: mysql
    host: localhost
    port: 3306
    name: qsdpdp_enterprise
    username: qsdpdp
    password: qsdpdp_secret
    ssl: false

---
# ═══════════════════════════════════════════════════════════════════
# PROFILE: Oracle
# ═══════════════════════════════════════════════════════════════════
spring:
  config:
    activate:
      on-profile: oracle

qsdpdp:
  database:
    type: oracle
    host: localhost
    port: 1521
    name: QSDPDP
    username: qsdpdp
    password: qsdpdp_secret

---
# ═══════════════════════════════════════════════════════════════════
# PROFILE: MS SQL Server
# ═══════════════════════════════════════════════════════════════════
spring:
  config:
    activate:
      on-profile: mssql

qsdpdp:
  database:
    type: mssql
    host: localhost
    port: 1433
    name: qsdpdp_enterprise
    username: sa
    password: qsdpdp_secret
    ssl: false
