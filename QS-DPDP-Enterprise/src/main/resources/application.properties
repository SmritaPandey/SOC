# Application Configuration
spring.application.name=QS-DPDP Enterprise
server.port=8080

# Serve static files from filesystem first (for dev) then classpath (for production JAR)
spring.web.resources.static-locations=file:src/main/resources/static/,classpath:/static/

# Logging Configuration
logging.level.root=INFO
logging.level.com.qsdpdp=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=${user.home}/.qsdpdp-enterprise/logs/qsdpdp.log

# Database Configuration
qsdpdp.db.path=${user.home}/.qsdpdp-enterprise/data/qsdpdp_enterprise.db

# Security Configuration
qsdpdp.security.session-timeout-minutes=30
qsdpdp.security.mfa-required=false
qsdpdp.security.password-min-length=12
qsdpdp.security.max-failed-logins=5
qsdpdp.security.lockout-duration-minutes=30

# Compliance Configuration
qsdpdp.compliance.breach-notification-hours=72
qsdpdp.compliance.certin-notification-hours=6
qsdpdp.compliance.rights-response-days=30
qsdpdp.compliance.consent-retention-years=7
qsdpdp.compliance.audit-retention-years=10

# RAG Thresholds
qsdpdp.rag.green-threshold=80
qsdpdp.rag.amber-threshold=50

# Feature Flags
qsdpdp.features.auto-seed-data=true
qsdpdp.features.audit-enabled=true
qsdpdp.features.encryption-enabled=true

# Google OAuth 2.0 (DPDP Compliant)
# Replace with your Google Cloud Console Client ID
# Create at: https://console.cloud.google.com/apis/credentials
google.oauth.client-id=

# Mail Configuration (for report sharing — optional in air-gapped mode)
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:25}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# API Documentation (Swagger/OpenAPI)
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Report Export
qsdpdp.reports.export-dir=${user.home}/.qsdpdp-enterprise/exports

# ═══════════════════════════════════════════════════════════
# Phase 1 v3.0 Configuration
# ═══════════════════════════════════════════════════════════

# Chatbot LLM Configuration
chatbot.llm.provider=ollama
chatbot.llm.ollama.host=${OLLAMA_HOST:http://localhost:11434}
chatbot.llm.ollama.model=${OLLAMA_MODEL:llama3}
chatbot.llm.ollama.timeout=120

# UEBA ML Configuration
qsdpdp.ueba.ml.enabled=true
qsdpdp.ueba.ml.isolation-forest-threshold=0.6
qsdpdp.ueba.ml.min-observations=50
qsdpdp.ueba.ml.retrain-interval-hours=24

# Redis Configuration (requires Docker: docker compose up -d redis)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Disable Redis auto-config in dev mode (when Docker isn't running)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

# ── JWT Configuration (auto-generated key in dev; set secret in prod) ──
# qsdpdp.security.jwt.secret=  (leave empty for auto-generated dev key)
qsdpdp.security.jwt.access-token-expiry-ms=86400000
qsdpdp.security.jwt.refresh-token-expiry-ms=604800000

# ── Rate Limiting (NIST AC-7) ──
qsdpdp.security.rate-limit.max-requests=200
qsdpdp.security.rate-limit.auth-max-requests=20
qsdpdp.security.rate-limit.window-seconds=60

# ── CORS: allowed origins ──
qsdpdp.security.cors.allowed-origins=http://localhost:3000,http://localhost:5000,http://localhost:5173,http://localhost:8080
