# ═══════════════════════════════════════════════════════════
# QS-DPDP Enterprise — Production Application Configuration
# Place in ./config/ directory alongside docker-compose.prod.yml
# ═══════════════════════════════════════════════════════════

server:
  port: 8080
  ssl:
    enabled: false  # Use reverse proxy (nginx/traefik) for TLS termination
  servlet:
    context-path: /

spring:
  profiles:
    active: production
  main:
    banner-mode: off

# ── Logging ──
logging:
  level:
    root: INFO
    com.qsdpdp: INFO
    org.springframework: WARN
    org.springframework.security: WARN
  file:
    path: /app/logs
    name: /app/logs/qsdpdp-enterprise.log
  logback:
    rollingpolicy:
      max-history: 30
      max-file-size: 50MB
      total-size-cap: 1GB

# ── License ──
qsdpdp:
  license:
    file-path: /app/config/license.key
    enforcement: true
  features:
    auto-seed-data: false
  security:
    cors-origins: "*"
    jwt-expiry-hours: 24
