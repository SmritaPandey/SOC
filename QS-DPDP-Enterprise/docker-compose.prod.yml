# ═══════════════════════════════════════════════════════════
# QS-DPDP Enterprise — Production Docker Compose
# On-Prem Deployment Configuration
#
# Usage:
#   1. Copy .env.template → .env and fill in values
#   2. Place license.key in ./config/
#   3. docker-compose -f docker-compose.prod.yml up -d
# ═══════════════════════════════════════════════════════════

version: '3.8'

services:
  # ── QS-DPDP Enterprise Backend ──
  qsdpdp-enterprise:
    image: qsdpdp/enterprise:${QSDPDP_VERSION:-3.0.0}
    container_name: qsdpdp-enterprise
    restart: unless-stopped
    ports:
      - "${QSDPDP_PORT:-8443}:8080"
    volumes:
      # License file (required)
      - ./config/license.key:/app/config/license.key:ro
      # Application configuration
      - ./config/application-production.yml:/app/config/application-production.yml:ro
      # Persistent data
      - qsdpdp-data:/app/data
      # Logs
      - qsdpdp-logs:/app/logs
    environment:
      - SPRING_PROFILES_ACTIVE=production
      - SPRING_CONFIG_ADDITIONAL-LOCATION=/app/config/
      - JAVA_OPTS=${JAVA_OPTS:--Xmx1g -Xms512m -XX:+UseG1GC -XX:+UseStringDeduplication}
      - QSDPDP_LICENSE_FILE=/app/config/license.key
      - TZ=${TIMEZONE:-Asia/Kolkata}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=256m
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Optional: Redis (for caching & sessions) ──
  redis:
    image: redis:7-alpine
    container_name: qsdpdp-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    profiles:
      - with-redis

volumes:
  qsdpdp-data:
    driver: local
  qsdpdp-logs:
    driver: local
  redis-data:
    driver: local

networks:
  default:
    name: qsdpdp-network
    driver: bridge
