# QS-DPDP Enterprise — Kubernetes Helm Values
replicaCount: 2

image:
  repository: qsdpdp/enterprise
  tag: "3.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: dpdp.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: qsdpdp-tls
      hosts:
        - dpdp.example.com

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# PostgreSQL (Bitnami subchart)
postgresql:
  enabled: true
  auth:
    postgresPassword: "changeme-in-production"
    database: qsdpdp
  primary:
    persistence:
      size: 20Gi

# Redis (Bitnami subchart)
redis:
  enabled: true
  auth:
    enabled: true
    password: "changeme-in-production"
  master:
    persistence:
      size: 2Gi

# Elasticsearch
elasticsearch:
  enabled: true
  replicas: 1
  minimumMasterNodes: 1
  resources:
    requests:
      memory: "1Gi"
    limits:
      memory: "2Gi"

# Application config
env:
  SPRING_PROFILES_ACTIVE: production
  SPRING_DATASOURCE_URL: jdbc:postgresql://qsdpdp-postgresql:5432/qsdpdp
  SPRING_REDIS_HOST: qsdpdp-redis-master
  QSDPDP_LLM_PROVIDER: ollama
  QSDPDP_LLM_HOST: http://ollama:11434

livenessProbe:
  httpGet:
    path: /api/v1/health
    port: 8080
  initialDelaySeconds: 60
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /api/v1/health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
