spring:
  application:
    name: QS-SIEM
  datasource:
    url: jdbc:h2:file:./data/qs-siem;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 9001

qshield:
  jwt:
    secret: ${JWT_SECRET:QShield-CSOC-SIEM-Secret-Change-In-Production-2026}
    access-token-expiry: 1800000
  ai:
    enabled: false
    ollama-url: http://localhost:11434
    model: llama3

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.qshield: INFO
    org.springframework.security: WARN

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/qshield_csoc
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:qshield}
    password: ${DB_PASSWORD:}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: siem
  h2:
    console:
      enabled: false
